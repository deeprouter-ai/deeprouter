# Production deploy: push to main → build image → ECR push → SSM rolls the
# single-EC2 docker-compose stack (deeprouter-ai/infra-ec2).
#
# Auth: GitHub OIDC → assume role/deeprouter-github-deploy (provisioned by
# deeprouter-ai/infra terraform, infra-ec2/cicd.tf). Trust policy is pinned to
# repo:deeprouter-ai/deeprouter:ref:refs/heads/main. No long-lived AWS keys,
# no inbound SSH — the deploy runs on the box via SSM RunShellScript.

name: deploy

on:
  push:
    branches: [main]
    paths:
      - 'controller/**'
      - 'middleware/**'
      - 'model/**'
      - 'relay/**'
      - 'router/**'
      - 'service/**'
      - 'internal/**'
      - 'common/**'
      - 'dto/**'
      - 'constant/**'
      - 'setting/**'
      - 'web/**'
      - 'main.go'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # OIDC

env:
  AWS_REGION: ap-southeast-2
  ROLE_ARN: arn:aws:iam::180294203030:role/deeprouter-github-deploy
  ECR_REPOSITORY: deeprouter
  INSTANCE_TAG: deeprouter

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, push
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            -t "$REGISTRY/$ECR_REPOSITORY:latest" \
            .
          docker push "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$ECR_REPOSITORY:latest"

      - name: Roll the stack via SSM
        # Roll ONLY the new-api service to the image this workflow just pushed.
        # The previous box-side ci-deploy.sh ran `docker compose pull` for the
        # WHOLE stack and bailed (skip-roll, exit 0) whenever any other image
        # (e.g. smart-router, owned by a different repo/CI) wasn't pullable from
        # ECR — so a green deploy could leave the box on the old image. This
        # repo only ships new-api, so pull+recreate just that service, pinned to
        # the :latest tag pushed above, regardless of the box .env's pin.
        run: |
          set -euo pipefail
          # The box .env is missing SMART_ROUTER_IMAGE, and the compose file
          # declares smart-router.image: ${SMART_ROUTER_IMAGE:?...}, so ANY
          # `docker compose` call fails at interpolation before doing anything.
          # We only roll new-api, so supply BOTH image vars inline (a valid
          # smart-router ref is enough — it is never pulled/recreated here) and
          # pass --no-deps so only new-api is touched.
          ROLL='set -e; cd /opt/deeprouter; REG=180294203030.dkr.ecr.ap-southeast-2.amazonaws.com; aws ecr get-login-password --region ap-southeast-2 | docker login --username AWS --password-stdin $REG; export DEEPROUTER_IMAGE=$REG/deeprouter:latest; export SMART_ROUTER_IMAGE=$REG/smart-router:latest; docker compose -f docker-compose.prod.yml pull new-api; docker compose -f docker-compose.prod.yml up -d --no-deps --force-recreate new-api; docker image prune -af || true'
          CMD_ID=$(aws ssm send-command \
            --targets "Key=tag:Name,Values=$INSTANCE_TAG" \
            --document-name "AWS-RunShellScript" \
            --comment "deploy deeprouter ${GITHUB_SHA::7}" \
            --parameters "commands=[$(printf '%s' "$ROLL" | jq -Rs .)]" \
            --query "Command.CommandId" --output text)
          echo "SSM command: $CMD_ID"
          STATUS=Pending; INSTID=
          for i in $(seq 1 90); do
            sleep 10
            read STATUS INSTID < <(aws ssm list-command-invocations \
              --command-id "$CMD_ID" --query "CommandInvocations[0].[Status,InstanceId]" \
              --output text 2>/dev/null || echo "Pending -")
            echo "  [$i] status=$STATUS instance=$INSTID"
            case "$STATUS" in
              Success) break;;
              Failed|Cancelled|TimedOut)
                echo "::error::deploy failed on $INSTID"
                aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTID" \
                  --query StandardErrorContent --output text || true
                exit 1;;
            esac
          done
          [ "$STATUS" = "Success" ] || { echo "::error::timed out"; exit 1; }
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTID" \
            --query StandardOutputContent --output text
