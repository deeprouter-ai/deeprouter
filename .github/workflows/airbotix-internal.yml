# CI for Airbotix / DeepRouter internal packages.
# Runs only on changes to our additions (model/user.go, internal/**) to avoid
# stepping on upstream NewAPI's own CI matrix.
name: airbotix-internal

on:
  push:
    branches: [main]
    paths:
      - 'model/user.go'
      - 'internal/**'
      - '.github/workflows/airbotix-internal.yml'
  pull_request:
    paths:
      - 'model/user.go'
      - 'internal/**'
      - '.github/workflows/airbotix-internal.yml'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Resolve module deps
        run: go mod download

      - name: Vet internal packages
        run: go vet ./internal/...

      - name: Build internal packages
        run: go build ./internal/...

      - name: Ensure model still compiles (we extend User in model/user.go)
        run: go build ./model/...

      - name: Run unit tests
        run: go test ./internal/... -count=1 -race -timeout 60s
